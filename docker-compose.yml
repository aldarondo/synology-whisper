services:
  synology-whisper:
    image: ghcr.io/aldarondo/synology-whisper:latest
    container_name: synology-whisper
    restart: unless-stopped
    ports:
      - "8778:8778"
    environment:
      PORT: 8778
    volumes:
      - ./logs:/app/logs
    command: sh -c "./whisper-server -m ./models/ggml-base.en.bin -t 4 --host 0.0.0.0 --port $$PORT 2>&1 | tee -a /app/logs/app.log"
    networks:
      - brian-mcp_default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

# Join the shared brian network so brian-telegram can reach this service
# at http://synology-whisper:8778 without going through the host
networks:
  brian-mcp_default:
    external: true
