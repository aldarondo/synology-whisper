name: Build synology-whisper image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-compose.yml
  schedule:
    # Rebuild weekly (Sunday 04:00 UTC) to pick up base image security patches
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Cache layers between builds — the whisper.cpp compile step is slow
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/synology-whisper:latest
            ghcr.io/${{ github.repository_owner }}/synology-whisper:${{ github.sha }}

      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1
        with:
          host: 192.168.0.64
          port: 2222
          username: charles
          password: ${{ secrets.NAS_SSH_PASSWORD }}
          script_stop: true
          envs: NAS_PASS
          script: |
            echo "$NAS_PASS" | sudo -S /usr/local/bin/docker compose -f /volume1/docker/synology-whisper/docker-compose.yml pull
            echo "$NAS_PASS" | sudo -S /usr/local/bin/docker compose -f /volume1/docker/synology-whisper/docker-compose.yml up -d
        env:
          NAS_PASS: ${{ secrets.NAS_SSH_PASSWORD }}
