name: Build synology-whisper image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-compose.yml
  schedule:
    # Rebuild weekly (Sunday 04:00 UTC) to pick up base image security patches
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Cache layers between builds — the whisper.cpp compile step is slow
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/synology-whisper:latest
            ghcr.io/${{ github.repository_owner }}/synology-whisper:${{ github.sha }}

